<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#060610">
    <title>Админ-панель — PieSenia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Unbounded:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#060610; --card:rgba(12,12,28,0.6); --border:rgba(255,255,255,0.04); --accent:#8b5cf6; --cyan:#02c1b3; --text:#e8e4f0; --text-dim:#8a84a0; --danger:#f87171; --success:#4ade80; --gold:#d4a853; --radius:24px; --glass:blur(32px); }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .bg{position:fixed;inset:0;z-index:0;pointer-events:none}
        .bg-orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.4}
        .bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(139,92,246,0.45) 0%,transparent 70%);top:-200px;left:-150px;animation:orbFloat 15s ease-in-out infinite}
        .bg-orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(2,193,179,0.35) 0%,transparent 70%);bottom:-150px;right:-100px;animation:orbFloat 18s ease-in-out infinite reverse}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-40px) scale(1.15)}}
        .panel{position:relative;z-index:1;background:var(--card);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:var(--radius);padding:36px 28px;max-width:800px;width:100%;box-shadow:0 40px 80px rgba(0,0,0,0.5)}
        h1{font-family:'Unbounded',sans-serif;text-align:center;margin-bottom:20px;background:linear-gradient(135deg,#02c1b3,#8b5cf6,#f0d078);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.8rem}
        input{width:100%;padding:14px;margin:10px 0;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px;color:var(--text);text-align:center;font-size:1rem;outline:none;font-family:inherit;transition:all 0.4s}
        input:focus{border-color:var(--accent);box-shadow:0 0 30px rgba(139,92,246,0.3)}
        .btn{padding:14px;border:none;border-radius:14px;font-weight:700;cursor:pointer;width:100%;font-size:.9rem;font-family:inherit;transition:all .4s;letter-spacing:0.03em}
        .btn-accent{background:linear-gradient(135deg,var(--accent),#6d28d9);color:#fff}
        .btn-accent:hover{transform:translateY(-3px);box-shadow:0 15px 40px rgba(139,92,246,0.3)}
        .order{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;transition:all 0.3s}
        .order:hover{background:rgba(255,255,255,0.04);border-color:rgba(139,92,246,0.2)}
        .order .info{flex:1;min-width:220px}
        .order .actions{display:flex;gap:8px}
        .order .actions button{padding:10px 20px;border-radius:12px;border:none;cursor:pointer;font-weight:700;font-family:inherit;transition:all 0.3s}
        .order .actions button:hover{transform:scale(1.05)}
        .btn-confirm{background:var(--success);color:#000}
        .btn-reject{background:var(--danger);color:#fff}
        .hidden{display:none!important}
        .stats{text-align:center;margin-bottom:20px;color:var(--text-dim);font-size:0.9rem}
        .stats span{color:var(--text);font-weight:700}
        .spinner{width:24px;height:24px;border:3px solid transparent;border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto 12px}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div class="bg"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
    <div class="panel">
        <h1>🔐 Админ-панель</h1>
        <div id="loginBlock">
            <input type="password" id="passInput" placeholder="Пароль">
            <button class="btn btn-accent" onclick="login()">Войти</button>
        </div>
        <div id="adminBlock" class="hidden">
            <div class="stats">Всего заказов: <span id="totalOrders">—</span> | Ожидают: <span id="pendingOrders">—</span></div>
            <button class="btn btn-accent" onclick="loadOrders()" style="margin-bottom:14px;">🔄 Обновить</button>
            <div id="ordersList"></div>
            <p style="text-align:center;margin-top:20px;"><a href="/" style="color:var(--text-dim);font-size:.8rem;text-decoration:none;">← Вернуться на сайт</a></p>
        </div>
    </div>
    <script>
        const API='https://Rettero.pythonanywhere.com';
        function login(){if(document.getElementById('passInput').value==='709'){document.getElementById('loginBlock').classList.add('hidden');document.getElementById('adminBlock').classList.remove('hidden');loadOrders();}else alert('❌ Неверный пароль!');}
        document.getElementById('passInput').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
        async function loadOrders(){
            document.getElementById('ordersList').innerHTML='<div class="spinner"></div><p style="text-align:center;color:var(--text-dim);">Загрузка...</p>';
            try{
                const r=await fetch(`${API}/api/orders-list`);const d=await r.json();const orders=d.orders||[];
                document.getElementById('totalOrders').textContent=orders.length;
                document.getElementById('pendingOrders').textContent=orders.filter(o=>o.status==='pending').length;
                document.getElementById('ordersList').innerHTML=orders.length===0?'<p style="text-align:center;color:var(--text-dim);">Заказов пока нет</p>'
                :orders.reverse().map(o=>{
                    const t=o.caption?o.caption.replace(/[*_`\[\]()]/g,'').substring(0,100):'Заказ';
                    return `<div class="order"><div class="info"><strong>${t}</strong><br><small style="color:var(--text-dim);">🕐 ${o.time||'—'} | 🆔 ${o.guest||'—'} | 📌 ${o.status==='pending'?'Ожидает':o.status==='paid'?'Оплачен':'Отклонён'}</small></div><div class="actions">${o.status==='pending'?`<button class="btn-confirm" onclick="confirmOrder('${o.guest}')">✅ Подтвердить</button><button class="btn-reject" onclick="rejectOrder('${o.guest}')">❌ Отклонить</button>`:`<span style="color:${o.status==='paid'?'var(--success)':'var(--danger)'};font-weight:700;">${o.status==='paid'?'✅ Оплачен':'❌ Отклонён'}</span>`}</div></div>`;
                }).join('');
            }catch(e){document.getElementById('ordersList').innerHTML='<p style="text-align:center;color:var(--danger);">Ошибка загрузки</p>';}
        }
        async function confirmOrder(g){await fetch(`${API}/api/confirm-payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest:g})});loadOrders();}
        async function rejectOrder(g){await fetch(`${API}/api/reject-payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest:g})});loadOrders();}
    </script>
</body>
</html>
