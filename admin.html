<!-- ==================== admin.html ==================== -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#060610">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="google-adsense-account" content="ca-pub-4228536607258228">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <title>PieSenia — Авторские песни</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Unbounded:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060610;
            --card: rgba(12, 12, 28, 0.55);
            --border: rgba(255, 255, 255, 0.05);
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --cyan: #02c1b3;
            --neon-pink: #ff2d95;
            --neon-blue: #00d4ff;
            --text: #e8e4f0;
            --text-dim: #8a84a0;
            --danger: #f87171;
            --success: #4ade80;
            --warning: #fbbf24;
            --gold: #d4a853;
            --radius: 22px;
            --glass: blur(36px);
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .bg { position:fixed; inset:0; z-index:0; pointer-events:none; }
        .bg-orb { position:absolute; border-radius:50%; filter:blur(100px); opacity:0.3; animation:orbFloat 15s ease-in-out infinite; }
        .bg-orb-1 { width:600px; height:600px; background:radial-gradient(circle, rgba(139,92,246,0.4) 0%, transparent 70%); top:-200px; left:-150px; }
        .bg-orb-2 { width:500px; height:500px; background:radial-gradient(circle, rgba(2,193,179,0.3) 0%, transparent 70%); bottom:-150px; right:-100px; animation-delay:-7s; }
        @keyframes orbFloat { 0%,100%{ transform:translate(0,0) scale(1); } 50%{ transform:translate(40px,-40px) scale(1.15); } }
        .app { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:20px; }
        .login-box { background:var(--card); backdrop-filter:var(--glass); border:1px solid var(--border); border-radius:var(--radius); padding:40px; max-width:420px; margin:120px auto; text-align:center; box-shadow:0 30px 60px rgba(0,0,0,0.5); }
        .login-box input { width:100%; padding:16px; margin:10px 0; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:14px; color:var(--text); text-align:center; font-size:1rem; outline:none; font-family:inherit; }
        .login-box input:focus { border-color:var(--accent); box-shadow:0 0 20px rgba(139,92,246,0.3); }
        .header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; margin-bottom:24px; padding:20px 24px; background:var(--card); backdrop-filter:var(--glass); border:1px solid var(--border); border-radius:var(--radius); }
        .header h1 { font-family:'Unbounded',sans-serif; font-size:1.5rem; background:linear-gradient(135deg, var(--cyan), var(--accent-light), var(--neon-pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
        .tab-btn { padding:12px 22px; border-radius:30px; border:1px solid var(--border); background:rgba(255,255,255,0.02); backdrop-filter:var(--glass); color:var(--text); cursor:pointer; font-weight:600; font-size:0.82rem; transition:all var(--transition); font-family:inherit; }
        .tab-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 0 30px rgba(139,92,246,0.4); }
        .tab-btn:hover:not(.active) { border-color:var(--accent-light); background:rgba(139,92,246,0.1); }
        .panel { background:var(--card); backdrop-filter:var(--glass); border:1px solid var(--border); border-radius:var(--radius); padding:28px; display:none; box-shadow:0 20px 50px rgba(0,0,0,0.4); animation:panelIn 0.4s var(--transition); }
        .panel.active { display:block; }
        @keyframes panelIn { from{ opacity:0; transform:translateY(20px); } to{ opacity:1; transform:translateY(0); } }
        .stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
        .stat-card { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:18px; padding:20px; text-align:center; }
        .stat-card .num { font-size:2rem; font-weight:800; font-family:'Unbounded',sans-serif; }
        .stat-card .lbl { font-size:0.75rem; color:var(--text-dim); margin-top:4px; }
        .btn { padding:12px 22px; border:none; border-radius:14px; font-weight:700; cursor:pointer; font-size:0.82rem; font-family:inherit; transition:all var(--transition); display:inline-flex; align-items:center; gap:6px; }
        .btn-accent { background:var(--accent); color:#fff; }
        .btn-danger { background:var(--danger); color:#fff; }
        .btn-success { background:var(--success); color:#000; }
        .btn-warning { background:var(--warning); color:#000; }
        .btn-outline { background:transparent; border:1px solid var(--accent); color:var(--accent-light); }
        .btn:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,0,0,0.4); }
        .btn-full { width:100%; justify-content:center; }
        .btn-sm { padding:8px 16px; font-size:0.75rem; }
        .btn-xs { padding:5px 12px; font-size:0.7rem; border-radius:10px; }
        .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
        .toolbar input, .toolbar select { padding:12px 16px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:14px; color:var(--text); font-family:inherit; outline:none; flex:1; min-width:150px; }
        .toolbar input:focus, .toolbar select:focus { border-color:var(--accent); }
        .order-row { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; font-size:0.85rem; transition:all var(--transition); cursor:pointer; }
        .order-row:hover { background:rgba(255,255,255,0.05); }
        .order-detail { display:none; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); font-size:0.8rem; color:var(--text-dim); line-height:1.8; width:100%; }
        .order-detail.open { display:block; }
        .badge { padding:4px 10px; border-radius:12px; font-size:0.7rem; font-weight:700; }
        .badge-pending { background:rgba(251,191,36,0.2); color:#fbbf24; }
        .badge-paid { background:rgba(74,222,128,0.2); color:#4ade80; }
        .badge-rejected { background:rgba(248,113,113,0.2); color:#f87171; }
        .row { display:flex; gap:10px; flex-wrap:wrap; }
        .row>* { flex:1; min-width:150px; }
        input, textarea, select { width:100%; padding:14px; margin:8px 0; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:14px; color:var(--text); font-size:0.9rem; outline:none; font-family:inherit; transition:all var(--transition); }
        input:focus, textarea:focus, select:focus { border-color:var(--accent); box-shadow:0 0 20px rgba(139,92,246,0.2); background:rgba(255,255,255,0.07); }
        textarea { min-height:80px; resize:vertical; }
        .edit-form { background:rgba(139,92,246,0.05); border:1px solid rgba(139,92,246,0.2); border-radius:16px; padding:18px; margin-top:8px; }
        .hint { color:var(--text-dim); font-size:0.75rem; margin-top:4px; }
        .hidden { display:none !important; }
        .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--success); color:#000; padding:14px 30px; border-radius:30px; font-weight:700; z-index:9999; animation:toastIn 0.4s ease, toastOut 0.4s ease 2.5s forwards; }
        @keyframes toastIn { from{ opacity:0; transform:translateX(-50%) translateY(20px); } to{ opacity:1; transform:translateX(-50%) translateY(0); } }
        @keyframes toastOut { from{ opacity:1; } to{ opacity:0; } }
        .modal { display:flex; visibility:hidden; opacity:0; position:fixed; inset:0; background:rgba(4,4,12,0.92); backdrop-filter:blur(20px); z-index:999; justify-content:center; align-items:center; padding:24px; transition:visibility 0s 0.4s, opacity 0.4s var(--transition); }
        .modal.active { visibility:visible; opacity:1; transition:visibility 0s 0s, opacity 0.4s var(--transition); }
        .modal-box { background:rgba(20,20,45,0.75); backdrop-filter:var(--glass); border:1px solid rgba(255,255,255,0.1); border-radius:28px; padding:36px 28px; max-width:440px; width:100%; text-align:center; box-shadow:0 30px 70px rgba(0,0,0,0.7); transform:scale(0.85) translateY(30px); transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1); }
        .modal.active .modal-box { transform:scale(1) translateY(0); }
        .modal-box h2 { font-family:'Unbounded',sans-serif; margin-bottom:12px; font-size:1.3rem; background:linear-gradient(135deg, var(--neon-blue), var(--accent-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .modal-box p { color:var(--text-dim); margin-bottom:20px; }
        .modal-box .btn { margin:4px; }
        .catalog-item { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:8px; }
        .user-item { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:16px; padding:14px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
        .feedback-item { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:16px; padding:14px; margin-bottom:8px; }
        .chat-message { margin-bottom:8px; padding:8px 12px; border-radius:14px; }
        .chat-message.admin { background:rgba(139,92,246,0.2); }
        .chat-message.user { background:rgba(255,255,255,0.05); }
        @media(max-width:768px) { .toolbar>* { min-width:100%; } .stats { grid-template-columns:repeat(2,1fr); } }
        /* ... все стили из твоего рабочего файла ... */
        /* добавлен стиль для кнопки редактирования чата */
        .chat-edit-btn {
            background: none;
            border: none;
            color: var(--accent-light);
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 8px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .chat-edit-btn:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="bg"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
    <div class="app">
        <!-- Логин -->
        <div id="loginBlock" class="login-box">
            <h1 style="font-family:'Unbounded',sans-serif;margin-bottom:20px;background:linear-gradient(135deg,var(--cyan),var(--accent-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">🔐 Omni Admin</h1>
            <input type="password" id="passInput" placeholder="Пароль администратора">
            <button class="btn btn-accent btn-full" onclick="login()" style="margin-top:10px;">Войти</button>
        </div>

        <!-- Админка -->
        <div id="adminBlock" class="hidden">
            <div class="header">
                <h1>🎵 Omni Admin — PieSenia</h1>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <button class="btn btn-outline btn-sm" onclick="window.open('/','_blank')">🌐 Сайт</button>
                    <button class="btn btn-danger btn-sm" onclick="logout()">🚪 Выйти</button>
                </div>
            </div>

            <!-- Табы -->
            <div class="tabs" id="tabBar">
                <button class="tab-btn active" data-tab="orders">📋 Заказы</button>
                <button class="tab-btn" data-tab="catalog">📀 Каталог</button>
                <button class="tab-btn" data-tab="users">👤 Пользователи</button>
                <button class="tab-btn" data-tab="feedback">💬 Отзывы</button>
                <button class="tab-btn" data-tab="points">💎 Баллы</button>
                <button class="tab-btn" data-tab="subscriptions">👑 Подписки</button>
                <button class="tab-btn" data-tab="chats">💬 Чат</button>
                <button class="tab-btn" data-tab="settings">⚙️ Настройки</button>
                <button class="tab-btn" data-tab="logs">📜 Логи</button>
                <button class="tab-btn" data-tab="backup">💾 Бэкап</button>
            </div>

            <!-- Панель: Заказы -->
            <div class="panel active" id="panel-orders">
                <div class="stats" id="orderStats">
                    <div class="stat-card"><div class="num" id="totalOrders">0</div><div class="lbl">Всего</div></div>
                    <div class="stat-card"><div class="num" id="pendingOrders" style="color:var(--warning);">0</div><div class="lbl">Ожидают</div></div>
                    <div class="stat-card"><div class="num" id="paidOrders" style="color:var(--success);">0</div><div class="lbl">Оплачены</div></div>
                    <div class="stat-card"><div class="num" id="rejectedOrders" style="color:var(--danger);">0</div><div class="lbl">Отклонены</div></div>
                </div>
                <div class="toolbar">
                    <select id="filterStatus" onchange="loadOrders()"><option value="all">Все</option><option value="pending">Ожидают</option><option value="paid">Оплачены</option><option value="rejected">Отклонены</option></select>
                    <input id="searchOrders" placeholder="🔍 Поиск..." oninput="loadOrders()">
                    <button class="btn btn-outline btn-sm" onclick="toggleSelectAll()">☑️ Выбрать все</button>
                    <button class="btn btn-success btn-sm" onclick="massConfirm()">✅ Подтвердить</button>
                    <button class="btn btn-danger btn-sm" onclick="massReject()">❌ Отклонить</button>
                    <button class="btn btn-outline btn-sm" onclick="exportCSV()">📥 CSV</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteAllOrders()">🗑 Удалить все</button>
                </div>
                <div id="ordersList"></div>
            </div>

            <!-- Панель: Каталог -->
            <div class="panel" id="panel-catalog">
                <div class="toolbar">
                    <button class="btn btn-accent btn-sm" onclick="loadCatalog()">🔄 Обновить</button>
                    <button class="btn btn-success btn-sm" onclick="document.getElementById('addProductForm').classList.toggle('hidden')">➕ Добавить товар</button>
                </div>
                <div id="addProductForm" class="hidden" style="margin-bottom:20px;background:rgba(139,92,246,0.05);border:1px solid rgba(139,92,246,0.2);border-radius:16px;padding:20px;">
                    <h3 style="margin-bottom:12px;">➕ Новый товар</h3>
                    <input id="newTitle" placeholder="Название *">
                    <div class="row"><input id="newPrice" placeholder="Цена ₽ *" type="number"><input id="newEmoji" placeholder="Эмодзи"></div>
                    <input id="newDesc" placeholder="Описание"><input id="newTags" placeholder="Теги через запятую">
                    <div class="row">
                        <select id="newMediaType"><option value="custom">Свой файл</option><option value="video">Тестовое видео</option><option value="audio">Тестовое аудио</option></select>
                        <input id="newBase" placeholder="Имя файла (media/...)">
                    </div>
                    <select id="newCategory"><option value="sad">💔 Грустные</option><option value="happy">🎉 Весёлые</option><option value="adult">🔞 Взрослые</option><option value="kids">🧒 Детские</option><option value="love">❤️ Про любовь</option></select>
                    <button class="btn btn-success btn-full" onclick="addProduct()">✅ Добавить</button>
                </div>
                <div id="catalogList"></div>
            </div>

            <!-- Панель: Пользователи -->
            <div class="panel" id="panel-users">
                <div class="toolbar"><button class="btn btn-accent btn-sm" onclick="loadUsers()">🔄 Обновить</button></div>
                <div id="usersList"></div>
            </div>

            <!-- Панель: Отзывы -->
            <div class="panel" id="panel-feedback">
                <div class="toolbar"><button class="btn btn-accent btn-sm" onclick="loadFeedback()">🔄 Обновить</button></div>
                <div id="feedbackList"></div>
            </div>

            <!-- Панель: Баллы -->
            <div class="panel" id="panel-points">
                <h2 style="font-family:'Unbounded',sans-serif;margin-bottom:16px;">💎 Управление баллами</h2>
                <div class="row">
                    <input id="pointsNick" placeholder="Ник пользователя">
                    <input id="pointsAmount" placeholder="Кол-во баллов (+/-)" type="number">
                </div>
                <input id="pointsReason" placeholder="Причина">
                <button class="btn btn-accent btn-full" onclick="addPointsToUser()">➕ Начислить</button>
                <button class="btn btn-danger btn-full" onclick="addPointsToUser(true)" style="margin-top:8px;">➖ Списать</button>
                <div id="pointsList" style="margin-top:20px;"></div>
            </div>

            <!-- Панель: Подписки -->
            <div class="panel" id="panel-subscriptions">
                <h2 style="font-family:'Unbounded',sans-serif;margin-bottom:16px;">👑 Управление подписками</h2>
                <div class="row">
                    <input id="subNick" placeholder="Ник пользователя">
                    <select id="subPlan"><option value="1day">1 день (100₽)</option><option value="1week">1 неделя (300₽)</option><option value="1month">1 месяц (1000₽)</option><option value="3months">3 месяца Ultra (3000₽)</option></select>
                </div>
                <label style="display:flex;align-items:center;gap:8px;margin:8px 0;"><input type="checkbox" id="subAutopay"> Автопродление</label>
                <button class="btn btn-accent btn-full" onclick="activateSubscription()">✅ Активировать подписку</button>
                <button class="btn btn-danger btn-full" onclick="cancelSubscription()" style="margin-top:8px;">❌ Отменить подписку</button>
                <div id="subsList" style="margin-top:20px;"></div>
            </div>

            <!-- Панель: Чат -->
            <div class="panel" id="panel-chats">
                <h2 style="font-family:'Unbounded',sans-serif;margin-bottom:16px;">💬 Чат поддержки</h2>
                <div style="margin-bottom:16px;">
                    <h3>Активные диалоги:</h3>
                    <div id="activeChats" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;"></div>
                </div>
                <div id="chatAdminMessages" style="max-height:350px;overflow-y:auto;margin-bottom:16px;padding:12px;background:rgba(0,0,0,0.2);border-radius:16px;"></div>
                <div style="display:flex;gap:10px;">
                    <textarea id="chatAdminInput" placeholder="Ответ..." style="flex:1;min-height:50px;"></textarea>
                    <button class="btn btn-accent" onclick="sendAdminChatReply()">📤</button>
                    <button class="btn btn-success btn-sm" onclick="resolveChat()">✅ Решено</button>
                    <div style="display:flex;gap:10px;">
                    <textarea id="chatAdminInput" placeholder="Ответ..." style="flex:1;min-height:50px;"></textarea>
                    <button class="btn btn-accent" id="chatSendBtn" onclick="sendAdminChatReply()">📤</button>
                    <button class="btn btn-success btn-sm" onclick="resolveChat()">✅ Решено</button>
                </div>
            </div>

            <!-- Панель: Настройки -->
            <div class="panel" id="panel-settings">
                <h2 style="font-family:'Unbounded',sans-serif;margin-bottom:16px;">⚙️ Настройки</h2>
                <label>Номер телефона</label><input id="setPhone">
                <label>Банк</label><input id="setBank">
                <label>Получатель</label><input id="setName">
                <label>ЮMoney</label><input id="setYoo">
                <label>Telegram Bot Token</label><input id="setBotToken">
                <label>Admin Chat ID</label><input id="setAdminChat">
                <button class="btn btn-accent btn-full" onclick="saveSettings()">💾 Сохранить</button>
            </div>

            <!-- Панель: Логи -->
            <div class="panel" id="panel-logs">
                <h2 style="font-family:'Unbounded',sans-serif;margin-bottom:16px;">📜 Логи действий</h2>
                <div id="logsList"></div>
            </div>

            <!-- Панель: Бэкап -->
            <div class="panel" id="panel-backup">
                <h2 style="font-family:'Unbounded',sans-serif;margin-bottom:16px;">💾 Резервное копирование</h2>
                <button class="btn btn-accent btn-full" onclick="createBackup()">💾 Создать резервную копию</button>
                <button class="btn btn-outline btn-full" onclick="restoreBackup()" style="margin-top:10px;">📥 Восстановить из копии</button>
                <div id="backupInfo" style="margin-top:16px;color:var(--text-dim);"></div>
            </div>
        </div>
    </div>

    <!-- Кастомный confirm -->
    <div class="modal" id="confirmModal"><div class="modal-box"><h2 id="confirmTitle">Подтверждение</h2><p id="confirmMessage"></p><div style="display:flex;gap:10px;justify-content:center;"><button class="btn btn-accent" id="confirmYes">Да</button><button class="btn btn-sm" id="confirmNo">Отмена</button></div></div></div>

    <script>
        const API = 'https://Rettero.pythonanywhere.com';
        const PASS = '2610777';
        let S = JSON.parse(localStorage.getItem('px_admin_settings') || '{"phone":"+79048628327","bank":"Альфа-банк","name":"Иван Максимович К.","yoomoney":"4100117765240041","bot_token":"","admin_chat":""}');
        let logs = JSON.parse(localStorage.getItem('px_admin_logs') || '[]');
        let selectedOrders = [];
        let currentChatUser = '';
        let confirmCallback = null;

        function toast(msg) { const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2800); }
        function addLog(action) { logs.push({action, time:new Date().toLocaleString('ru-RU')}); localStorage.setItem('px_admin_logs', JSON.stringify(logs)); }
        function customConfirm(msg, cb, title='Подтверждение') { document.getElementById('confirmMessage').textContent=msg; document.getElementById('confirmTitle').textContent=title; confirmCallback=cb; document.getElementById('confirmModal').classList.add('active'); }
        document.getElementById('confirmYes').addEventListener('click',()=>{ document.getElementById('confirmModal').classList.remove('active'); if(confirmCallback)confirmCallback(true); confirmCallback=null; });
        document.getElementById('confirmNo').addEventListener('click',()=>{ document.getElementById('confirmModal').classList.remove('active'); if(confirmCallback)confirmCallback(false); confirmCallback=null; });

        async function login() {
            const pass = document.getElementById('passInput').value;
            if (pass === PASS) { enterAdmin(); return; }
            const r = await fetch(`${API}/api/check-admin-password`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass})});

        // ==================== ЗАКАЗЫ ====================
        async function loadOrders() {
            const filter = document.getElementById('filterStatus').value, search = document.getElementById('searchOrders').value.toLowerCase();
            const r = await fetch(`${API}/api/orders-list`); let orders = ((await r.json()).orders||[]);
            if(filter!=='all') orders=orders.filter(o=>o.status===filter);
            if(search) orders=orders.filter(o=>(o.caption||'').toLowerCase().includes(search)||(o.guest||'').toLowerCase().includes(search));
            document.getElementById('totalOrders').textContent=orders.length;
            document.getElementById('pendingOrders').textContent=orders.filter(o=>o.status==='pending').length;
            document.getElementById('paidOrders').textContent=orders.filter(o=>o.status==='paid').length;
            document.getElementById('rejectedOrders').textContent=orders.filter(o=>o.status==='rejected').length;
            document.getElementById('ordersList').innerHTML = orders.length===0?'<p style="text-align:center;color:var(--text-dim);">Заказов нет</p>':orders.reverse().map(o=>{
                const t = o.caption?o.caption.replace(/[*_`\[\]()]/g,''):'Заказ #'+o.id, guest=o.guest||'неизвестный';
                return `<div class="order-row" onclick="this.querySelector('.order-detail').classList.toggle('open')">
                    <input type="checkbox" class="order-checkbox" data-guest="${guest}" data-time="${o.time||''}" onclick="event.stopPropagation();updateSelectedOrders()" style="margin-right:10px;">
                    <div style="flex:1;min-width:200px;"><strong>#${o.id} — ${t.substring(0,60)}</strong><br><small style="color:var(--text-dim);">🕐 ${o.time||'—'} | 🆔 ${guest} | <span class="badge badge-${o.status==='pending'?'pending':o.status==='paid'?'paid':'rejected'}">${o.status==='pending'?'Ожидает':o.status==='paid'?'Оплачен':'Отклонён'}</span></small></div>
                    <div style="display:flex;gap:6px;" onclick="event.stopPropagation();">
                        ${o.status==='pending'?`<button class="btn btn-success btn-xs" onclick="confirmOrder('${guest}')">✅</button><button class="btn btn-danger btn-xs" onclick="rejectOrder('${guest}')">❌</button>`:`<button class="btn btn-outline btn-xs" onclick="toggleStatus('${guest}')">🔄</button>`}
                        <button class="btn btn-danger btn-xs" onclick="deleteOrder('${guest}','${o.time}')">🗑</button>
                    </div>
                    <div class="order-detail"><strong>Полный текст:</strong><br>${t}<br><br><strong>Гость:</strong> ${guest}<br><strong>Время:</strong> ${o.time||'—'}</div>
                </div>`;
            }).join('');
        }

        async function addProduct() {
            const t = document.getElementById('newTitle').value.trim(), p = document.getElementById('newPrice').value.trim();

                    await fetch(`${API}/api/activate-subscription`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nick,plan,autopay})});

                        <div><strong>${u.nick}</strong> ${u.role && u.role !== 'user' ? `[${u.role}]` : ''} ${online.includes(u.nick) ? '🟢' : ''}<br><small>${u.created || '—'} | ${u.banned ? '<span style="color:var(--danger);">🚫</span>' : '<span style="color:var(--success);">✅</span>'}</small></div>
                        <div style="display:flex;gap:6px;">
                            <button class="btn btn-outline btn-xs" onclick="changeRole('${u.nick}')">🔄 Роль</button>
                            ${u.banned ? `<button class="btn btn-success btn-sm" onclick="unbanUser('${u.nick}')">Разбанить</button>` : `<button class="btn btn-danger btn-sm" onclick="banUser('${u.nick}')">Забанить</button>`}
                            <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.nick}')">🗑</button>
                        </div>
                    </div>`).join('');
        }

        // ---------- БАЛЛЫ: проверка пользователя, минимальное списание ----------
        async function addPointsToUser(negative = false) {
            const nick = document.getElementById('pointsNick').value.trim();
            let amount = parseInt(document.getElementById('pointsAmount').value);
            if (isNaN(amount)) return toast('Введите корректное число!');
            if (negative) amount = -Math.abs(amount);
            const reason = document.getElementById('pointsReason').value.trim() || (negative ? 'Списание' : 'Начисление');
            if (!nick) return toast('Введите ник!');
            // Проверка существования пользователя
            const existR = await fetch(`${API}/api/user-exists`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nick }) });
            const exist = (await existR.json()).exists;
            if (!exist) return toast('Пользователь не найден!');
            // Минимальное списание 10000 баллов
            if (negative && Math.abs(amount) < 10000) return toast('Минимальное списание: 10 000 баллов');
            const r = await fetch(`${API}/api/add-points`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nick, amount, reason }) });
            const res = await r.json();
            if (res.ok) {
                toast(`💎 ${amount > 0 ? '+' + amount : amount} баллов для ${nick}. Баланс: ${res.balance}`);
                addLog(`Баллы ${nick}: ${amount}`);
                loadPoints();
            } else {
                toast('Ошибка: ' + (res.error || ''));
            }
        }

        function loadPoints() {
            document.getElementById('pointsList').innerHTML = '<p style="color:var(--text-dim);">Введите ник и количество баллов (+/-). Мин. списание 10 000 баллов.</p>';
        }

        // ---------- ЧАТ: редактирование сообщений админом ----------
        let editingAdminMsgId = null;

        async function loadChatMessagesForUser(nick) {
            const r = await fetch(`${API}/api/chat-user-messages`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nick }) });
            const msgs = ((await r.json()).messages || []);
            document.getElementById('chatAdminMessages').innerHTML = msgs.map(m => {
                const editBtn = (m.sender === 'admin') ? `<button class="chat-edit-btn" onclick="startEditAdminMessage(${m.id}, '${m.message.replace(/'/g, "\\'")}')">✏️</button>` : '';
                return `<div class="chat-message ${m.sender === 'admin' ? 'admin' : 'user'}">
                    <strong>${m.sender === 'admin' ? '💬 Вы (админ)' : '👤 ' + m.nick}</strong>${editBtn}
                    <div class="chat-msg-text" id="admin-msg-text-${m.id}">${m.message}</div>
                    <small style="color:var(--text-dim);">${m.time}</small>
                </div>`;
            }).join('');
        }

        function startEditAdminMessage(msgId, currentText) {
            editingAdminMsgId = msgId;
            document.getElementById('chatAdminInput').value = currentText;
            document.getElementById('chatAdminInput').focus();
            const sendBtn = document.getElementById('chatSendBtn');
            sendBtn.textContent = '💾';
            sendBtn.onclick = saveEditedAdminMessage;
        }

        async function saveEditedAdminMessage() {
            const newText = document.getElementById('chatAdminInput').value.trim();
            if (!newText || !editingAdminMsgId) return;
            await fetch(`${API}/api/chat-edit-message`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: editingAdminMsgId, message: newText, nick: currentChatUser, sender: 'admin' })
            });
            editingAdminMsgId = null;
            document.getElementById('chatAdminInput').value = '';
            const sendBtn = document.getElementById('chatSendBtn');
            sendBtn.textContent = '📤';
            sendBtn.onclick = sendAdminChatReply;
            await loadChatMessagesForUser(currentChatUser);
        }

        async function sendAdminChatReply() {
            if (editingAdminMsgId) {
                await saveEditedAdminMessage();
                return;
            }
            const msg = document.getElementById('chatAdminInput').value.trim();
            if (!msg || !currentChatUser) return toast('Введите сообщение и выберите пользователя!');
            await fetch(`${API}/api/chat-admin-reply`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nick: currentChatUser, message: msg }) });
            document.getElementById('chatAdminInput').value = '';
            await loadChatMessagesForUser(currentChatUser);
        }

        // Остальной код без изменений...
        loadSettingsForm();
    </script>
</body>
</html>
