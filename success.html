<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата прошла! - PieSenia</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #060610;
            color: #e8e4f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .box {
            background: rgba(18,18,36,0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 40px 30px;
            max-width: 420px;
        }
        .icon { font-size: 64px; }
        h1 { font-size: 1.5rem; margin: 16px 0 8px; }
        p { color: #8a84a0; margin-bottom: 20px; }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background: #8b5cf6;
            color: #fff;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(139,92,246,0.3); }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">✅</div>
        <h1>Оплата прошла!</h1>
        <p>Я свяжусь с тобой в ближайшее время и отправлю файлы.</p>
        <a href="/" class="btn">← Вернуться в каталог</a>
    </div>
</body>
</html>
