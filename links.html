        h1{font-family:'Unbounded',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;background:linear-gradient(135deg,var(--neon-blue),var(--accent-light),var(--neon-pink),var(--gold-light));background-size:400% 400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 6s ease-in-out infinite}
        @keyframes shimmer{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}

        .category-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;cursor:pointer;user-select:none}
        .category-header .emoji{font-size:28px}
        .category-header .title{font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:700;color:var(--text)}
        .category-header .count{font-size:.75rem;color:var(--text-dim);background:rgba(255,255,255,.05);padding:2px 12px;border-radius:20px}
        .category-header .arrow{transition:transform .3s ease;color:var(--text-dim);font-size:.9rem}

        .links-list{display:flex;flex-wrap:wrap;gap:10px;padding-top:4px}

        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(30px) scale(.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
        @keyframes toastOut{from{opacity:1}to{opacity:0}}

function renderLinks() {
    const container = document.getElementById('linksContainer');
    let html = '';
    let total = 0;

    linksData.forEach((cat, idx) => {
        const count = cat.links.length;
        total += count;
        const collapsed = true;

        html += `
            <div class="category">
                <div class="category-header" onclick="toggleCategory(this)">
                    <span class="emoji">${cat.category.match(/^.{1,2}/)?.[0] || '📌'}</span>
                    <span class="title">${cat.category.replace(/^.{1,2}\s/, '')}</span>
                    <span class="count">${count}</span>
                    <span class="arrow ${collapsed ? '' : 'open'}">▼</span>
                </div>
                <div class="links-list ${collapsed ? 'collapsed' : ''}">
                    ${cat.links.map(link => {
                        const isPromo = link.includes('—');
                        const displayText = isPromo ? link : link;
                        const href = isPromo ? link.split(' — ')[0] : link;
                        const promoText = isPromo ? link.split(' — ')[1] : '';
                        return `
                            <a href="${href}" target="_blank" class="link-item" rel="noopener noreferrer">
                                <span>${displayText}</span>
                                ${promoText ? `<span class="badge-link">${promoText}</span>` : ''}
                                <span class="copy-btn" onclick="event.preventDefault();copyLink('${href}')">📋</span>
                            </a>
                        `;
                    }).join('')}
                </div>
            </div>
        `;
    });

    container.innerHTML = html;
    document.getElementById('totalCount').textContent = total;
}

function toggleCategory(header) {
    const list = header.nextElementSibling;
    const arrow = header.querySelector('.arrow');
    list.classList.toggle('collapsed');
    arrow.classList.toggle('open');
}

function copyLink(url) {
    navigator.clipboard.writeText(url).then(() => {
        const toast = document.createElement('div');
        toast.className = 'copy-toast';
        toast.textContent = '✅ Ссылка скопирована!';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    }).catch(() => {
        const toast = document.createElement('div');
        toast.className = 'copy-toast';
        toast.textContent = '⚠️ Не удалось скопировать';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    });
}
