<!-- ==================== admin.html ==================== -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#060610">
    <title>Админ-панель — PieSenia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Unbounded:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#060610;--card:rgba(12,12,28,0.6);--border:rgba(255,255,255,0.04);--accent:#8b5cf6;--cyan:#02c1b3;--text:#e8e4f0;--text-dim:#8a84a0;--danger:#f87171;--success:#4ade80;--gold:#d4a853;--warning:#fbbf24;--radius:20px;--glass:blur(32px)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
        .bg{position:fixed;inset:0;z-index:0;pointer-events:none}
        .bg-orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.4;animation:orbFloat 15s ease-in-out infinite}
        .bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(139,92,246,0.45) 0%,transparent 70%);top:-200px;left:-150px}
        .bg-orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(2,193,179,0.35) 0%,transparent 70%);bottom:-150px;right:-100px;animation-delay:-7s}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-40px) scale(1.15)}}
        .app{position:relative;z-index:1;max-width:1000px;margin:0 auto}
        .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
        .tab-btn{padding:12px 24px;border-radius:30px;border:1px solid var(--border);background:rgba(255,255,255,0.02);backdrop-filter:var(--glass);color:var(--text);cursor:pointer;font-weight:600;font-size:0.85rem;transition:all 0.3s;font-family:inherit}
        .tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
        .tab-btn:hover:not(.active){border-color:var(--accent)}
        .panel{background:var(--card);backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:var(--radius);padding:28px;display:none;box-shadow:0 30px 60px rgba(0,0,0,0.4)}
        .panel.active{display:block}
        h1{font-family:'Unbounded',sans-serif;text-align:center;margin-bottom:20px;background:linear-gradient(135deg,var(--cyan),var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.6rem}
        input,textarea,select{width:100%;padding:14px;margin:8px 0;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:0.9rem;outline:none;font-family:inherit;transition:all 0.3s}
        input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 20px rgba(139,92,246,0.2);background:rgba(255,255,255,0.08)}
        textarea{min-height:80px;resize:vertical}
        .btn{padding:12px 20px;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:0.85rem;font-family:inherit;transition:all 0.3s;display:inline-flex;align-items:center;gap:6px}
        .btn-accent{background:var(--accent);color:#fff}
        .btn-danger{background:var(--danger);color:#fff}
        .btn-success{background:var(--success);color:#000}
        .btn-warning{background:var(--warning);color:#000}
        .btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
        .btn-sm{padding:8px 16px;font-size:0.78rem}
        .btn-xs{padding:6px 12px;font-size:0.7rem;border-radius:8px}
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(0,0,0,0.3)}
        .btn-full{width:100%;justify-content:center}
        .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
        .toolbar>*{flex:1;min-width:150px}
        .stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
        .stat-card{flex:1;min-width:120px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center}
        .stat-card .num{font-size:1.8rem;font-weight:800;font-family:'Unbounded',sans-serif}
        .stat-card .lbl{font-size:0.75rem;color:var(--text-dim);margin-top:4px}
        .order{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;transition:all 0.3s}
        .order:hover{background:rgba(255,255,255,0.04);border-color:rgba(139,92,246,0.2)}
        .order-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;cursor:pointer}
        .order-header .info{flex:1;min-width:180px;font-size:0.85rem}
        .order-header .actions{display:flex;gap:6px;align-items:center}
        .order-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:0.82rem;color:var(--text-dim);line-height:1.8}
        .order-detail.open{display:block}
        .checkbox{width:18px;height:18px;cursor:pointer;accent-color:var(--accent)}
        .badge{padding:4px 10px;border-radius:12px;font-size:0.7rem;font-weight:700}
        .badge-pending{background:rgba(251,191,36,0.2);color:#fbbf24}
        .badge-paid{background:rgba(74,222,128,0.2);color:#4ade80}
        .badge-rejected{background:rgba(248,113,113,0.2);color:#f87171}
        .badge-banned{background:rgba(248,113,113,0.2);color:#f87171}
        .hidden{display:none!important}
        .spinner{width:24px;height:24px;border:3px solid transparent;border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto 12px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .row{display:flex;gap:10px;flex-wrap:wrap}
        .row>*{flex:1;min-width:150px}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--success);color:#000;padding:12px 28px;border-radius:30px;font-weight:700;z-index:9999;animation:toastIn 0.4s ease,toastOut 0.4s ease 2.5s forwards}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        @keyframes toastOut{from{opacity:1}to{opacity:0}}
        .catalog-item{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;font-size:0.85rem;transition:all 0.3s}
        .catalog-item:hover{background:rgba(255,255,255,0.06);border-color:rgba(139,92,246,0.2)}
        .catalog-item .info{flex:1;min-width:200px}
        .catalog-item .info strong{color:var(--text)}
        .catalog-item .info small{color:var(--text-dim)}
        .edit-form{background:rgba(139,92,246,0.05);border:1px solid rgba(139,92,246,0.2);border-radius:14px;padding:16px;margin-top:8px}
        .edit-form label{font-size:0.7rem;color:var(--text-dim);text-transform:uppercase;display:block;margin-bottom:4px}
        .hint{font-size:0.7rem;color:var(--text-dim);margin-top:2px}
        .user-item{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;font-size:0.85rem}
        .user-item .info{flex:1;min-width:180px}
        @media(max-width:768px){.toolbar>*{min-width:100%}.stats-bar{flex-direction:column}}
    </style>
</head>
<body>
    <div class="bg"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
    <div class="app">
        <div id="loginBlock" class="panel active" style="max-width:400px;margin:100px auto;text-align:center;">
            <h1>🔐 Админ-панель</h1>
            <input type="password" id="passInput" placeholder="Пароль">
            <button class="btn btn-accent btn-full" onclick="login()">Войти</button>
        </div>
        <div id="adminBlock" class="hidden">
            <div class="tabs">
                <button class="tab-btn active" data-tab="orders">📋 Заказы</button>
                <button class="tab-btn" data-tab="catalog">📀 Каталог</button>
                <button class="tab-btn" data-tab="users">👤 Пользователи</button>
                <button class="tab-btn" data-tab="add">➕ Добавить</button>
                <button class="tab-btn" data-tab="settings">⚙️ Настройки</button>
            </div>
            <div class="panel active" id="panel-orders">
                <h1>📋 Заказы</h1>
                <div class="stats-bar">
                    <div class="stat-card"><div class="num" id="totalOrders" style="color:var(--text);">0</div><div class="lbl">Всего</div></div>
                    <div class="stat-card"><div class="num" id="pendingOrders" style="color:var(--warning);">0</div><div class="lbl">Ожидают</div></div>
                    <div class="stat-card"><div class="num" id="paidOrders" style="color:var(--success);">0</div><div class="lbl">Оплачены</div></div>
                    <div class="stat-card"><div class="num" id="rejectedOrders" style="color:var(--danger);">0</div><div class="lbl">Отклонены</div></div>
                </div>
                <div class="toolbar">
                    <select id="filterStatus" onchange="loadOrders()" style="padding:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px;color:var(--text);font-family:inherit;">
                        <option value="all">Все</option><option value="pending">Ожидают</option><option value="paid">Оплачены</option><option value="rejected">Отклонены</option>
                    </select>
                    <input id="searchOrders" placeholder="🔍 Поиск по гостю или названию..." oninput="loadOrders()">
                    <button class="btn btn-accent btn-sm" onclick="loadOrders()">🔄</button>
                    <button class="btn btn-success btn-sm" onclick="massConfirm()">✅ Подтвердить выбранные</button>
                    <button class="btn btn-danger btn-sm" onclick="massReject()">❌ Отклонить выбранные</button>
                    <button class="btn btn-accent btn-sm" onclick="exportCSV()">📥 CSV</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteAllOrders()">🗑 Удалить все</button>
                </div>
                <div id="ordersList"></div>
            </div>
            <div class="panel" id="panel-catalog">
                <h1>📀 Каталог</h1>
                <button class="btn btn-accent btn-sm" onclick="loadCatalog()" style="margin-bottom:14px;">🔄 Обновить</button>
                <div id="catalogList"></div>
            </div>
            <div class="panel" id="panel-users">
                <h1>👤 Пользователи</h1>
                <button class="btn btn-accent btn-sm" onclick="loadUsers()" style="margin-bottom:14px;">🔄 Обновить</button>
                <div id="usersList"></div>
            </div>
            <div class="panel" id="panel-add">
                <h1>➕ Добавить товар</h1>
                <input id="newTitle" placeholder="Название песни *">
                <div class="row"><input id="newPrice" placeholder="Цена в ₽ *" type="number"><input id="newEmoji" placeholder="Эмодзи (необязательно)"></div>
                <input id="newDesc" placeholder="Описание (необязательно)"><input id="newTags" placeholder="Теги через запятую (необязательно)">
                <div class="row"><select id="newCategory"><option value="sad">💔 Грустные</option><option value="happy">🎉 Весёлые</option><option value="adult">🔞 Взрослые</option><option value="kids">🧒 Детские</option><option value="love">❤️ Про любовь</option></select><input id="newBase" placeholder="Имя файла без расширения (необязательно)"></div>
                <p class="hint">* — обязательные поля.</p>
                <button class="btn btn-accent btn-full" onclick="addProduct()">✅ Добавить товар</button>
            </div>
            <div class="panel" id="panel-settings">
                <h1>⚙️ Настройки</h1>
                <label style="color:var(--text-dim);">Номер телефона</label><input id="setPhone">
                <label style="color:var(--text-dim);">Банк</label><input id="setBank">
                <label style="color:var(--text-dim);">Получатель</label><input id="setName">
                <label style="color:var(--text-dim);">ЮMoney</label><input id="setYoo">
                <button class="btn btn-accent btn-full" onclick="saveSettings()">💾 Сохранить</button>
            </div>
            <p style="text-align:center;margin-top:20px;"><a href="/" style="color:var(--text-dim);font-size:.8rem;">← На сайт</a></p>
        </div>
    </div>
    <script>
        const API='https://Rettero.pythonanywhere.com';
        let S=JSON.parse(localStorage.getItem('px_settings')||'{"phone":"+79048628327","bank":"Альфа-банк","name":"Иван Максимович К.","yoomoney":"4100117765240041"}');
        document.getElementById('setPhone').value=S.phone;document.getElementById('setBank').value=S.bank;document.getElementById('setName').value=S.name;document.getElementById('setYoo').value=S.yoomoney;
        async function login(){const pass=document.getElementById('passInput').value;try{const r=await fetch(`${API}/api/check-admin-password`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass})});const d=await r.json();if(d.ok){document.getElementById('loginBlock').classList.add('hidden');document.getElementById('adminBlock').classList.remove('hidden');showPanel('orders');loadOrders();}else alert('❌ Неверный пароль!');}catch(e){alert('Ошибка соединения');}}
        document.getElementById('passInput').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
        document.querySelector('.tabs').addEventListener('click',e=>{const btn=e.target.closest('.tab-btn[data-tab]');if(!btn)return;document.querySelectorAll('.tab-btn[data-tab]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');showPanel(btn.dataset.tab);if(btn.dataset.tab==='orders')loadOrders();if(btn.dataset.tab==='catalog')loadCatalog();if(btn.dataset.tab==='users')loadUsers();});
        function showPanel(name){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById('panel-'+name).classList.add('active');}
        function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2800);}
        let selectedOrders=[];
        async function loadOrders(){const filter=document.getElementById('filterStatus').value;const search=document.getElementById('searchOrders').value.toLowerCase();try{const r=await fetch(`${API}/api/orders-list`);const d=await r.json();let orders=d.orders||[];if(filter!=='all')orders=orders.filter(o=>o.status===filter);if(search)orders=orders.filter(o=>(o.caption||'').toLowerCase().includes(search)||(o.guest||'').toLowerCase().includes(search));document.getElementById('totalOrders').textContent=orders.length;document.getElementById('pendingOrders').textContent=orders.filter(o=>o.status==='pending').length;document.getElementById('paidOrders').textContent=orders.filter(o=>o.status==='paid').length;document.getElementById('rejectedOrders').textContent=orders.filter(o=>o.status==='rejected').length;document.getElementById('ordersList').innerHTML=orders.length===0?'<p style="text-align:center;color:var(--text-dim);">Нет заказов</p>':orders.reverse().map(o=>{const t=o.caption?o.caption.replace(/[*_`\[\]()]/g,''):'Заказ';return`<div class="order"><div class="order-header" onclick="this.parentElement.querySelector('.order-detail').classList.toggle('open')"><input type="checkbox" class="checkbox" onclick="event.stopPropagation();toggleSelect('${o.guest}','${o.time}')" style="margin-right:10px;"><div class="info"><strong>${t.substring(0,80)}</strong><br><small style="color:var(--text-dim);">🕐 ${o.time||'—'} | 🆔 ${o.guest||'—'} | <span class="badge badge-${o.status==='pending'?'pending':o.status==='paid'?'paid':'rejected'}">${o.status==='pending'?'Ожидает':o.status==='paid'?'Оплачен':'Отклонён'}</span></small></div><div class="actions"><button class="btn btn-outline btn-xs" onclick="event.stopPropagation();toggleStatus('${o.guest}','${o.time}')">🔄</button>${o.status==='pending'?`<button class="btn btn-success btn-sm" onclick="event.stopPropagation();confirmOrder('${o.guest}')">✅</button><button class="btn btn-danger btn-sm" onclick="event.stopPropagation();rejectOrder('${o.guest}')">❌</button>`:''}<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteOrder('${o.guest}','${o.time}')">🗑</button></div></div><div class="order-detail"><strong>Полный текст:</strong><br>${t}<br><br><strong>Гость:</strong> ${o.guest||'—'}<br><strong>Время:</strong> ${o.time||'—'}<br><strong>Статус:</strong> ${o.status||'—'}</div></div>`}).join('');}catch(e){document.getElementById('ordersList').innerHTML='<p style="text-align:center;color:var(--danger);">Ошибка</p>';}}
        function toggleSelect(guest,time){const key=guest+'|'+time;const idx=selectedOrders.indexOf(key);if(idx>-1)selectedOrders.splice(idx,1);else selectedOrders.push(key);}
        async function confirmOrder(g){await fetch(`${API}/api/confirm-payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest:g})});toast('✅ Подтверждено!');loadOrders();}
        async function rejectOrder(g){await fetch(`${API}/api/reject-payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest:g})});toast('❌ Отклонено!');loadOrders();}
        async function toggleStatus(guest,time){const r=await fetch(`${API}/api/orders-list`);const d=await r.json();const order=d.orders.find(o=>o.guest===guest&&o.time===time);if(!order)return;if(order.status==='paid'){await fetch(`${API}/api/reject-payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest})});}else if(order.status==='rejected'){await fetch(`${API}/api/confirm-payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest})});}else{return alert('Можно изменить только оплаченные или отклонённые заказы');}toast('🔄 Статус изменён!');loadOrders();}
        async function deleteOrder(g,t){if(!confirm('Удалить заказ?'))return;await fetch(`${API}/api/delete-order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest:g,time:t})});toast('🗑 Удалён!');loadOrders();}
        async function deleteAllOrders(){if(!confirm('Удалить ВСЕ заказы?'))return;await fetch(`${API}/api/clear-orders`,{method:'POST'});toast('🗑 Все удалены!');loadOrders();}
        async function massConfirm(){if(selectedOrders.length===0)return alert('Выберите заказы!');let count=0;for(const key of selectedOrders){const[guest,time]=key.split('|');const r=await fetch(`${API}/api/orders-list`);const d=await r.json();const order=d.orders.find(o=>o.guest===guest&&o.time===time);if(order&&order.status==='pending'){await fetch(`${API}/api/confirm-payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest})});count++;}}selectedOrders=[];toast('✅ Подтверждено: '+count);loadOrders();}
        async function massReject(){if(selectedOrders.length===0)return alert('Выберите заказы!');let count=0;for(const key of selectedOrders){const[guest,time]=key.split('|');const r=await fetch(`${API}/api/orders-list`);const d=await r.json();const order=d.orders.find(o=>o.guest===guest&&o.time===time);if(order&&order.status==='pending'){await fetch(`${API}/api/reject-payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest})});count++;}}selectedOrders=[];toast('❌ Отклонено: '+count);loadOrders();}
        function exportCSV(){fetch(`${API}/api/orders-list`).then(r=>r.json()).then(d=>{const orders=d.orders||[];let csv='Время;Гость;Статус;Описание\n';orders.forEach(o=>{csv+=`"${o.time||''}";"${o.guest||''}";"${o.status||''}";"${(o.caption||'').replace(/"/g,'""')}"\n`;});const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='orders.csv';a.click();toast('📥 CSV скачан!');});}
        async function loadCatalog(){try{const r=await fetch(`${API}/api/catalog`);const d=await r.json();const cat=d.products||[];document.getElementById('catalogList').innerHTML=cat.length===0?'<p style="text-align:center;color:var(--text-dim);">Каталог пуст</p>':cat.map(p=>`<div class="catalog-item" id="cat-item-${p.id}"><div class="info"><strong>${p.emoji||'🎵'} ${p.title}</strong> — <span style="color:var(--gold);font-weight:700;">${p.price}₽</span><br><small>${p.desc||'—'} | ${p.category||'—'} | ${(p.tags||[]).join(', ')||'—'} | ${p.base||'—'}</small></div><div class="actions"><button class="btn btn-outline btn-xs" onclick="startEdit(${p.id})">✏️</button><button class="btn btn-danger btn-xs" onclick="deleteProduct(${p.id})">🗑</button></div><div class="edit-form hidden" id="edit-form-${p.id}"><label>Название</label><input id="edit-title-${p.id}" value="${p.title}"><label>Цена</label><input id="edit-price-${p.id}" value="${p.price}" type="number"><label>Эмодзи</label><input id="edit-emoji-${p.id}" value="${p.emoji||''}"><label>Описание</label><input id="edit-desc-${p.id}" value="${p.desc||''}"><label>Теги</label><input id="edit-tags-${p.id}" value="${(p.tags||[]).join(', ')}"><label>Категория</label><select id="edit-cat-${p.id}"><option value="sad" ${p.category==='sad'?'selected':''}>💔 Грустные</option><option value="happy" ${p.category==='happy'?'selected':''}>🎉 Весёлые</option><option value="adult" ${p.category==='adult'?'selected':''}>🔞 Взрослые</option><option value="kids" ${p.category==='kids'?'selected':''}>🧒 Детские</option><option value="love" ${p.category==='love'?'selected':''}>❤️ Про любовь</option></select><label>Файл</label><input id="edit-base-${p.id}" value="${p.base||''}"><div style="display:flex;gap:8px;margin-top:10px;"><button class="btn btn-success btn-sm" onclick="saveEdit(${p.id})">💾 Сохранить</button><button class="btn btn-outline btn-sm" onclick="cancelEdit(${p.id})">Отмена</button></div></div></div>`).join('');}catch(e){document.getElementById('catalogList').innerHTML='<p style="text-align:center;color:var(--danger);">Ошибка</p>';}}
        function startEdit(id){document.querySelectorAll('.edit-form').forEach(f=>f.classList.add('hidden'));document.getElementById('edit-form-'+id).classList.remove('hidden');}
        function cancelEdit(id){document.getElementById('edit-form-'+id).classList.add('hidden');}
        async function saveEdit(id){const data={id:id,title:document.getElementById('edit-title-'+id).value.trim(),price:document.getElementById('edit-price-'+id).value.trim(),emoji:document.getElementById('edit-emoji-'+id).value.trim(),desc:document.getElementById('edit-desc-'+id).value.trim(),tags:document.getElementById('edit-tags-'+id).value.split(',').map(x=>x.trim()).filter(x=>x),category:document.getElementById('edit-cat-'+id).value,base:document.getElementById('edit-base-'+id).value.trim()};if(!data.title||!data.price)return alert('Название и цена обязательны!');await fetch(`${API}/api/update-product`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});toast('✅ Обновлён!');loadCatalog();}
        async function deleteProduct(id){if(!confirm('Удалить товар?'))return;await fetch(`${API}/api/delete-product`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});toast('🗑 Удалён!');loadCatalog();}
        async function addProduct(){const t=document.getElementById('newTitle').value.trim();const p=document.getElementById('newPrice').value.trim();if(!t||!p)return alert('Название и цена обязательны!');const d={title:t,price:p,emoji:document.getElementById('newEmoji').value.trim()||'🎵',desc:document.getElementById('newDesc').value.trim(),tags:document.getElementById('newTags').value.split(',').map(x=>x.trim()).filter(x=>x),category:document.getElementById('newCategory').value,base:document.getElementById('newBase').value.trim()||'media/'+t.toLowerCase().replace(/\s+/g,'_')};await fetch(`${API}/api/add-product`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});toast('✅ Добавлен!');document.getElementById('newTitle').value='';document.getElementById('newPrice').value='';loadCatalog();}
        async function loadUsers(){try{const r=await fetch(`${API}/api/users-list`);const d=await r.json();const users=d.users||{};const list=Object.values(users);document.getElementById('usersList').innerHTML=list.length===0?'<p style="text-align:center;color:var(--text-dim);">Нет пользователей</p>':list.map(u=>`<div class="user-item"><div class="info"><strong>${u.nick}</strong><br><small style="color:var(--text-dim);">Создан: ${u.created||'—'} | Статус: ${u.banned?'<span style="color:var(--danger);">Заблокирован</span>':'<span style="color:var(--success);">Активен</span>'}</small></div><div class="actions">${u.banned?`<button class="btn btn-success btn-sm" onclick="unbanUser('${u.nick}')">✅ Разбанить</button>`:`<button class="btn btn-danger btn-sm" onclick="banUser('${u.nick}')">🚫 Забанить</button>`}</div></div>`).join('');}catch(e){document.getElementById('usersList').innerHTML='<p style="text-align:center;color:var(--danger);">Ошибка</p>';}}
        async function banUser(nick){await fetch(`${API}/api/ban-user`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nick})});toast('🚫 Забанен!');loadUsers();}
        async function unbanUser(nick){await fetch(`${API}/api/unban-user`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nick})});toast('✅ Разбанен!');loadUsers();}
        function saveSettings(){S={phone:document.getElementById('setPhone').value,bank:document.getElementById('setBank').value,name:document.getElementById('setName').value,yoomoney:document.getElementById('setYoo').value};localStorage.setItem('px_settings',JSON.stringify(S));toast('💾 Сохранено!');}
    </script>
</body>
</html>
