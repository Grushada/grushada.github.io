<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#060610">
    <title>Админ-панель — PieSenia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Unbounded:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #060610; --card: rgba(18,18,36,0.6); --border: rgba(255,255,255,0.06); --accent: #8b5cf6; --text: #e8e4f0; --text-dim: #8a84a0; --danger: #f87171; --success: #4ade80; --gold: #d4a853; --gold-light: #f0d078; --radius: 20px; --glass: blur(24px); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.35; }
        .bg-orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(139,92,246,0.4) 0%, transparent 70%); top: -200px; left: -150px; }
        .bg-orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(212,168,83,0.3) 0%, transparent 70%); bottom: -150px; right: -100px; }
        .panel { position: relative; z-index: 1; background: var(--card); backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; max-width: 750px; width: 100%; }
        h1 { font-family: 'Unbounded', sans-serif; text-align: center; margin-bottom: 20px; background: linear-gradient(135deg, var(--gold-light), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.6rem; }
        .form-input { width: 100%; padding: 14px; margin: 10px 0; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 1rem; text-align: center; outline: none; font-family: inherit; }
        .form-input:focus { border-color: var(--accent); }
        .btn { padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; font-size: 0.9rem; transition: all 0.3s; font-family: inherit; }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(139,92,246,0.3); }
        .order { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; transition: all 0.3s; }
        .order:hover { background: rgba(255,255,255,0.04); }
        .order .info { flex: 1; min-width: 220px; }
        .order .info strong { font-size: 0.95rem; }
        .order .info small { font-size: 0.78rem; }
        .order .actions { display: flex; gap: 8px; }
        .order .actions button { padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; font-size: 0.85rem; transition: all 0.2s; font-family: inherit; }
        .order .actions button:hover { transform: scale(1.05); }
        .btn-confirm { background: var(--success); color: #000; }
        .btn-reject { background: var(--danger); color: #fff; }
        .hidden { display: none !important; }
        .stats { text-align: center; margin-bottom: 18px; color: var(--text-dim); font-size: 0.9rem; }
        .stats span { color: var(--text); font-weight: 700; }
        .logout { text-align: center; margin-top: 16px; }
        .logout a { color: var(--text-dim); font-size: 0.8rem; text-decoration: none; transition: color 0.3s; }
        .logout a:hover { color: var(--danger); }
        .empty-state { text-align: center; padding: 40px; color: var(--text-dim); }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="bg"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
    <div class="panel">
        <h1>🔐 Админ-панель PieSenia</h1>
        <div id="loginBlock">
            <input type="password" class="form-input" id="passInput" placeholder="Введите пароль администратора">
            <button class="btn btn-accent" onclick="login()">Войти в панель управления</button>
        </div>
        <div id="adminBlock" class="hidden">
            <div class="stats">Всего заказов: <span id="totalOrders">—</span> | Ожидают: <span id="pendingOrders">—</span></div>
            <button class="btn btn-accent" onclick="loadOrders()" style="margin-bottom:14px;">🔄 Обновить список заказов</button>
            <div id="ordersList"></div>
            <div class="logout"><a href="/">← Вернуться на сайт</a></div>
        </div>
    </div>
    <script>
        const API_BASE = 'https://Rettero.pythonanywhere.com';
        const PASS = '709';

        function login() {
            if (document.getElementById('passInput').value === PASS) {
                document.getElementById('loginBlock').classList.add('hidden');
                document.getElementById('adminBlock').classList.remove('hidden');
                loadOrders();
            } else {
                alert('❌ Неверный пароль! Доступ запрещён.');
            }
        }

        document.getElementById('passInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') login();
        });

        async function loadOrders() {
            const list = document.getElementById('ordersList');
            list.innerHTML = '<div class="empty-state"><div class="spinner" style="width:30px;height:30px;border:3px solid transparent;border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;"></div><p>Загружаем заказы...</p></div>';
            try {
                const resp = await fetch(`${API_BASE}/api/orders-list`);
                const data = await resp.json();
                const orders = data.orders || [];
                const pending = orders.filter(o => o.status === 'pending').length;
                document.getElementById('totalOrders').textContent = orders.length;
                document.getElementById('pendingOrders').textContent = pending;
                if (orders.length === 0) {
                    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Заказов пока нет</p></div>';
                    return;
                }
                list.innerHTML = orders.reverse().map(o => {
                    const title = o.caption ? o.caption.replace(/[*_`\[\]()]/g, '').substring(0, 100) : 'Заказ без названия';
                    const statusHTML = o.status === 'pending'
                        ? `<button class="btn-confirm" onclick="confirmOrder('${o.guest}')">✅ Подтвердить</button><button class="btn-reject" onclick="rejectOrder('${o.guest}')">❌ Отклонить</button>`
                        : `<span style="color:${o.status === 'paid' ? 'var(--success)' : 'var(--danger)'};font-weight:700;">${o.status === 'paid' ? '✅ Оплачен' : '❌ Отклонён'}</span>`;
                    return `<div class="order">
                        <div class="info">
                            <strong>${title}</strong><br>
                            <small style="color:var(--text-dim);">🕐 ${o.time || '—'} | 🆔 ${o.guest || '—'} | 📌 ${o.status === 'pending' ? 'Ожидает' : o.status === 'paid' ? 'Оплачен' : 'Отклонён'}</small>
                        </div>
                        <div class="actions">${statusHTML}</div>
                    </div>`;
                }).join('');
            } catch (e) {
                list.innerHTML = '<div class="empty-state" style="color:var(--danger);"><div class="icon">⚠️</div><p>Ошибка загрузки заказов</p><p style="font-size:0.8rem;">Проверьте соединение с сервером</p></div>';
            }
        }

        async function confirmOrder(guest) {
            if (!confirm('Подтвердить оплату для гостя ' + guest + '?')) return;
            try {
                await fetch(`${API_BASE}/api/confirm-payment`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ guest }) });
                loadOrders();
            } catch (e) { alert('Ошибка при подтверждении'); }
        }

        async function rejectOrder(guest) {
            if (!confirm('Отклонить заказ для гостя ' + guest + '?')) return;
            try {
                await fetch(`${API_BASE}/api/reject-payment`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ guest }) });
                loadOrders();
            } catch (e) { alert('Ошибка при отклонении'); }
        }
    </script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</body>
</html>
