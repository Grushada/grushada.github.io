<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#060610">
    <title>Оплата прошла! — PieSenia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Unbounded:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #060610; color: #e8e4f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; text-align: center; }
        .bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; }
        .bg-orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(139,92,246,0.4) 0%, transparent 70%); top: -200px; left: -150px; animation: float 15s ease-in-out infinite; }
        .bg-orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(212,168,83,0.3) 0%, transparent 70%); bottom: -150px; right: -100px; animation: float 18s ease-in-out infinite reverse; }
        @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-30px)} }
        .box { position: relative; z-index: 1; background: rgba(18,18,36,0.5); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 44px 32px; max-width: 440px; width: 90%; }
        .icon { font-size: 72px; animation: pop 0.5s cubic-bezier(0.4,0,0.2,1); }
        @keyframes pop { 0%{transform:scale(0);opacity:0} 70%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
        h1 { font-family: 'Unbounded', sans-serif; font-size: 1.6rem; margin: 18px 0 8px; }
        p { color: #8a84a0; margin-bottom: 24px; font-size: 0.95rem; }
        .btn { display: inline-block; padding: 14px 32px; background: #8b5cf6; color: #fff; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 0.9rem; transition: all 0.35s; border: none; cursor: pointer; font-family: inherit; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(139,92,246,0.35); }
        .btn-gold { background: linear-gradient(135deg, #f0d078, #8b6914); color: #000; margin-left: 8px; }
    </style>
</head>
<body>
    <div class="bg"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
    <div class="box">
        <div class="icon">💛</div>
        <h1>Оплата прошла!</h1>
        <p>Я свяжусь с тобой в ближайшее время и отправлю все файлы. Проверь контакты, которые ты указал при оформлении.</p>
        <a href="/" class="btn">← Вернуться в каталог</a>
    </div>
</body>
</html>
