<!-- ==================== admin.html ==================== -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#060610">
    <title>Админ-панель — PieSenia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Unbounded:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#060610;--card:rgba(12,12,28,0.6);--border:rgba(255,255,255,0.04);--accent:#8b5cf6;--cyan:#02c1b3;--text:#e8e4f0;--text-dim:#8a84a0;--danger:#f87171;--success:#4ade80;--gold:#d4a853;--warning:#fbbf24;--radius:20px;--glass:blur(32px)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
        .bg{position:fixed;inset:0;z-index:0;pointer-events:none}
        .bg-orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.4;animation:orbFloat 15s ease-in-out infinite}
        .bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(139,92,246,0.45) 0%,transparent 70%);top:-200px;left:-150px}
        .bg-orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(2,193,179,0.35) 0%,transparent 70%);bottom:-150px;right:-100px;animation-delay:-7s}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-40px) scale(1.15)}}
        .app{position:relative;z-index:1;max-width:1000px;margin:0 auto}
        .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
        .tab-btn{padding:12px 24px;border-radius:30px;border:1px solid var(--border);background:rgba(255,255,255,0.02);backdrop-filter:var(--glass);color:var(--text);cursor:pointer;font-weight:600;font-size:0.85rem;transition:all 0.3s;font-family:inherit}
        .tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
        .tab-btn:hover:not(.active){border-color:var(--accent)}
        .panel{background:var(--card);backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:var(--radius);padding:28px;display:none;box-shadow:0 30px 60px rgba(0,0,0,0.4)}
        .panel.active{display:block}
        h1{font-family:'Unbounded',sans-serif;text-align:center;margin-bottom:20px;background:linear-gradient(135deg,var(--cyan),var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.6rem}
        input,textarea,select{width:100%;padding:14px;margin:8px 0;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:0.9rem;outline:none;font-family:inherit;transition:all 0.3s}
        input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 20px rgba(139,92,246,0.2)}
        textarea{min-height:80px;resize:vertical}
        .btn{padding:12px 20px;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:0.85rem;font-family:inherit;transition:all 0.3s;display:inline-flex;align-items:center;gap:6px}
        .btn-accent{background:var(--accent);color:#fff}
        .btn-danger{background:var(--danger);color:#fff}
        .btn-success{background:var(--success);color:#000}
        .btn-warning{background:var(--warning);color:#000}
        .btn-sm{padding:8px 16px;font-size:0.78rem}
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(0,0,0,0.3)}
        .btn-full{width:100%;justify-content:center}
        .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
        .toolbar>*{flex:1;min-width:150px}
        .stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
        .stat-card{flex:1;min-width:120px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center}
        .stat-card .num{font-size:1.8rem;font-weight:800;font-family:'Unbounded',sans-serif}
        .stat-card .lbl{font-size:0.75rem;color:var(--text-dim);margin-top:4px}
        .order{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;transition:all 0.3s}
        .order:hover{background:rgba(255,255,255,0.04);border-color:rgba(139,92,246,0.2)}
        .order-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;cursor:pointer}
        .order-header .info{flex:1;min-width:180px;font-size:0.85rem}
        .order-header .actions{display:flex;gap:6px;align-items:center}
        .order-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:0.82rem;color:var(--text-dim);line-height:1.8}
        .order-detail.open{display:block}
        .checkbox{width:18px;height:18px;cursor:pointer;accent-color:var(--accent)}
        .badge{padding:4px 10px;border-radius:12px;font-size:0.7rem;font-weight:700}
        .badge-pending{background:rgba(251,191,36,0.2);color:#fbbf24}
        .badge-paid{background:rgba(74,222,128,0.2);color:#4ade80}
        .badge-rejected{background:rgba(248,113,113,0.2);color:#f87171}
        .hidden{display:none!important}
        .spinner{width:24px;height:24px;border:3px solid transparent;border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto 12px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .row{display:flex;gap:10px;flex-wrap:wrap}
        .row>*{flex:1;min-width:150px}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--success);color:#000;padding:12px 28px;border-radius:30px;font-weight:700;z-index:9999;animation:toastIn 0.4s ease,toastOut 0.4s ease 2.5s forwards}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        @keyframes toastOut{from{opacity:1}to{opacity:0}}
        .catalog-item{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;font-size:0.85rem}
        .catalog-item .info{flex:1;min-width:180px}
        @media(max-width:768px){.toolbar>*{min-width:100%}.stats-bar{flex-direction:column}}
    </style>
</head>
<body>
    <div class="bg"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
    <div class="app">
        <div id="loginBlock" class="panel active" style="max-width:400px;margin:100px auto;text-align:center;">
            <h1>🔐 Админ-панель</h1>
            <input type="password" id="passInput" placeholder="Пароль">
            <button class="btn btn-accent btn-full" onclick="login()">Войти</button>
        </div>
        <div id="adminBlock" class="hidden">
            <div class="tabs">
                <button class="tab-btn active" data-tab="orders">📋 Заказы</button>
                <button class="tab-btn" data-tab="catalog">📀 Каталог</button>
                <button class="tab-btn" data-tab="add">➕ Добавить</button>
                <button class="tab-btn" data-tab="settings">⚙️ Настройки</button>
            </div>

            <!-- ЗАКАЗЫ -->
            <div class="panel active" id="panel-orders">
                <h1>📋 Заказы</h1>
                <div class="stats-bar">
                    <div class="stat-card"><div class="num" id="totalOrders" style="color:var(--text);">0</div><div class="lbl">Всего</div></div>
                    <div class="stat-card"><div class="num" id="pendingOrders" style="color:var(--warning);">0</div><div class="lbl">Ожидают</div></div>
                    <div class="stat-card"><div class="num" id="paidOrders" style="color:var(--success);">0</div><div class="lbl">Оплачены</div></div>
                    <div class="stat-card"><div class="num" id="rejectedOrders" style="color:var(--danger);">0</div><div class="lbl">Отклонены</div></div>
                </div>
                <div class="toolbar">
                    <select id="filterStatus" onchange="loadOrders()" style="padding:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px;color:var(--text);font-family:inherit;">
                        <option value="all">Все</option><option value="pending">Ожидают</option><option value="paid">Оплачены</option><option value="rejected">Отклонены</option>
                    </select>
                    <input id="searchOrders" placeholder="🔍 Поиск по гостю или названию..." oninput="loadOrders()">
                    <button class="btn btn-accent btn-sm" onclick="loadOrders()">🔄 Обновить</button>
                    <button class="btn btn-warning btn-sm" onclick="checkAllPayments()">🔍 Проверить платежи</button>
                    <button class="btn btn-success btn-sm" onclick="massConfirm()">✅ Массово подтвердить</button>
                    <button class="btn btn-danger btn-sm" onclick="massReject()">❌ Массово отклонить</button>
                    <button class="btn btn-accent btn-sm" onclick="exportCSV()">📥 CSV</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteAllOrders()">🗑 Удалить все</button>
                </div>
                <div id="ordersList"></div>
            </div>

            <!-- КАТАЛОГ -->
            <div class="panel" id="panel-catalog">
                <h1>📀 Каталог</h1>
                <button class="btn btn-accent btn-sm" onclick="loadCatalog()">🔄 Обновить</button>
                <div id="catalogList" style="margin-top:14px;"></div>
            </div>

            <!-- ДОБАВИТЬ -->
            <div class="panel" id="panel-add">
                <h1>➕ Добавить товар</h1>
                <input id="newTitle" placeholder="Название">
                <div class="row"><input id="newPrice" placeholder="Цена (₽)" type="number"><input id="newEmoji" placeholder="Эмодзи (💔)"></div>
                <input id="newDesc" placeholder="Описание"><input id="newTags" placeholder="Теги через запятую">
                <div class="row"><select id="newCategory"><option value="sad">💔 Грустные</option><option value="happy">🎉 Весёлые</option><option value="adult">🔞 Взрослые</option><option value="kids">🧒 Детские</option><option value="love">❤️ Про любовь</option></select><input id="newBase" placeholder="Имя файла"></div>
                <button class="btn btn-accent btn-full" onclick="addProduct()">✅ Добавить</button>
            </div>

            <!-- НАСТРОЙКИ -->
            <div class="panel" id="panel-settings">
                <h1>⚙️ Настройки</h1>
                <label style="color:var(--text-dim);">Номер телефона</label><input id="setPhone">
                <label style="color:var(--text-dim);">Банк</label><input id="setBank">
                <label style="color:var(--text-dim);">Получатель</label><input id="setName">
                <label style="color:var(--text-dim);">ЮMoney</label><input id="setYoo">
                <button class="btn btn-accent btn-full" onclick="saveSettings()">💾 Сохранить</button>
            </div>
            <p style="text-align:center;margin-top:20px;"><a href="/" style="color:var(--text-dim);font-size:.8rem;">← На сайт</a></p>
        </div>
    </div>
    <script>
        const API='https://Rettero.pythonanywhere.com';
        const PASS='709';
        let S=JSON.parse(localStorage.getItem('px_settings')||'{"phone":"+79048628327","bank":"Альфа-банк","name":"Иван Максимович К.","yoomoney":"4100117765240041"}');
        document.getElementById('setPhone').value=S.phone;document.getElementById('setBank').value=S.bank;document.getElementById('setName').value=S.name;document.getElementById('setYoo').value=S.yoomoney;

        function login(){if(document.getElementById('passInput').value===PASS){document.getElementById('loginBlock').classList.add('hidden');document.getElementById('adminBlock').classList.remove('hidden');showPanel('orders');loadOrders();}else alert('❌ Неверный пароль!');}
        document.getElementById('passInput').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
        document.querySelector('.tabs').addEventListener('click',e=>{const btn=e.target.closest('.tab-btn[data-tab]');if(!btn)return;document.querySelectorAll('.tab-btn[data-tab]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');showPanel(btn.dataset.tab);if(btn.dataset.tab==='orders')loadOrders();if(btn.dataset.tab==='catalog')loadCatalog();});
        function showPanel(name){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById('panel-'+name).classList.add('active');}
        function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2800);}

        let selectedOrders=[];

        async function loadOrders(){
            const filter=document.getElementById('filterStatus').value;
            const search=document.getElementById('searchOrders').value.toLowerCase();
            try{const r=await fetch(`${API}/api/orders-list`);const d=await r.json();let orders=d.orders||[];
            if(filter!=='all') orders=orders.filter(o=>o.status===filter);
            if(search) orders=orders.filter(o=>(o.caption||'').toLowerCase().includes(search)||(o.guest||'').toLowerCase().includes(search));
            document.getElementById('totalOrders').textContent=orders.length;
            document.getElementById('pendingOrders').textContent=orders.filter(o=>o.status==='pending').length;
            document.getElementById('paidOrders').textContent=orders.filter(o=>o.status==='paid').length;
            document.getElementById('rejectedOrders').textContent=orders.filter(o=>o.status==='rejected').length;
            document.getElementById('ordersList').innerHTML=orders.length===0?'<p style="text-align:center;color:var(--text-dim);">Заказов пока нет</p>':orders.reverse().map(o=>{
                const t=o.caption?o.caption.replace(/[*_`\[\]()]/g,''):'Заказ';
                return`<div class="order"><div class="order-header" onclick="this.parentElement.querySelector('.order-detail').classList.toggle('open')"><input type="checkbox" class="checkbox" onclick="event.stopPropagation();toggleSelect('${o.guest}','${o.time}')" style="margin-right:10px;"><div class="info"><strong>${t.substring(0,80)}</strong><br><small style="color:var(--text-dim);">🕐 ${o.time||'—'} | 🆔 ${o.guest||'—'} | <span class="badge badge-${o.status==='pending'?'pending':o.status==='paid'?'paid':'rejected'}">${o.status==='pending'?'Ожидает':o.status==='paid'?'Оплачен':'Отклонён'}</span></small></div><div class="actions">${o.status==='pending'?`<button class="btn btn-success btn-sm" onclick="event.stopPropagation();confirmOrder('${o.guest}')">✅</button><button class="btn btn-danger btn-sm" onclick="event.stopPropagation();rejectOrder('${o.guest}')">❌</button>`:''}<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteOrder('${o.guest}','${o.time}')">🗑</button></div></div><div class="order-detail"><strong>Полный текст:</strong><br>${t}<br><br><strong>Гость:</strong> ${o.guest||'—'}<br><strong>Время:</strong> ${o.time||'—'}<br><strong>Статус:</strong> ${o.status||'—'}</div></div>`}).join('');}catch(e){document.getElementById('ordersList').innerHTML='<p style="text-align:center;color:var(--danger);">Ошибка загрузки</p>';}}

        function toggleSelect(guest,time){const key=guest+'|'+time;const idx=selectedOrders.indexOf(key);if(idx>-1)selectedOrders.splice(idx,1);else selectedOrders.push(key);}
        async function confirmOrder(g){await fetch(`${API}/api/confirm-payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest:g})});toast('✅ Подтверждено!');loadOrders();}
        async function rejectOrder(g){await fetch(`${API}/api/reject-payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest:g})});toast('❌ Отклонено!');loadOrders();}
        async function deleteOrder(g,t){if(!confirm('Удалить заказ?'))return;await fetch(`${API}/api/delete-order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest:g,time:t})});toast('🗑 Заказ удалён!');loadOrders();}
        async function deleteAllOrders(){if(!confirm('Удалить АБСОЛЮТНО ВСЕ заказы? Это действие необратимо!'))return;await fetch(`${API}/api/clear-orders`,{method:'POST'});toast('🗑 Все заказы удалены!');loadOrders();}
        async function massConfirm(){if(selectedOrders.length===0)return alert('Выберите заказы галочками!');const count=selectedOrders.length;for(const key of selectedOrders){const[guest]=key.split('|');await fetch(`${API}/api/confirm-payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest})});}selectedOrders=[];toast('✅ Подтверждено: '+count);loadOrders();}
        async function massReject(){if(selectedOrders.length===0)return alert('Выберите заказы галочками!');const count=selectedOrders.length;for(const key of selectedOrders){const[guest]=key.split('|');await fetch(`${API}/api/reject-payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest})});}selectedOrders=[];toast('❌ Отклонено: '+count);loadOrders();}
        async function checkAllPayments(){const r=await fetch(`${API}/api/orders-list`);const d=await r.json();const orders=(d.orders||[]).filter(o=>o.status==='pending');if(orders.length===0)return toast('Нет ожидающих платежей');toast('🔍 Проверяем '+orders.length+' платежей...');for(const o of orders){await fetch(`${API}/api/check-payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({guest:o.guest})});}loadOrders();toast('✅ Проверка завершена!');}
        function exportCSV(){fetch(`${API}/api/orders-list`).then(r=>r.json()).then(d=>{const orders=d.orders||[];let csv='Время;Гость;Статус;Описание\n';orders.forEach(o=>{csv+=`"${o.time||''}";"${o.guest||''}";"${o.status||''}";"${(o.caption||'').replace(/"/g,'""')}"\n`;});const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='orders.csv';a.click();toast('📥 CSV скачан!');});}

        async function loadCatalog(){try{const r=await fetch(`${API}/api/catalog`);const d=await r.json();const cat=d.products||[];document.getElementById('catalogList').innerHTML=cat.map(p=>`<div class="catalog-item"><div class="info"><strong>${p.emoji||''} ${p.title}</strong> — ${p.price}₽<br><small style="color:var(--text-dim);">${p.desc||''} | ${p.category||''}</small></div><button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">🗑</button></div>`).join('');}catch(e){document.getElementById('catalogList').innerHTML='<p style="text-align:center;color:var(--danger);">Ошибка</p>';}}
        async function deleteProduct(id){if(!confirm('Удалить товар #'+id+'?'))return;await fetch(`${API}/api/delete-product`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});toast('🗑 Товар удалён!');loadCatalog();}
        async function addProduct(){const t=document.getElementById('newTitle').value.trim();const p=document.getElementById('newPrice').value.trim();if(!t||!p)return alert('Название и цена обязательны!');const d={title:t,price:p,emoji:document.getElementById('newEmoji').value.trim()||'🎵',desc:document.getElementById('newDesc').value.trim(),tags:document.getElementById('newTags').value.split(',').map(x=>x.trim()).filter(x=>x),category:document.getElementById('newCategory').value,base:document.getElementById('newBase').value.trim()||t.toLowerCase().replace(/\s+/g,'_')};await fetch(`${API}/api/add-product`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});toast('✅ Товар добавлен!');document.getElementById('newTitle').value='';document.getElementById('newPrice').value='';loadCatalog();}
        function saveSettings(){S={phone:document.getElementById('setPhone').value,bank:document.getElementById('setBank').value,name:document.getElementById('setName').value,yoomoney:document.getElementById('setYoo').value};localStorage.setItem('px_settings',JSON.stringify(S));toast('💾 Настройки сохранены!');}
    </script>
</body>
</html>
